name: Deploy to fatschi.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to fatschi.github.io
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git clone https://x-access-token:${GH_PAT}@github.com/fatschi/fatschi.github.io.git gh-pages
          mkdir -p gh-pages/bpmn-fiddle
          cp dist/index.html gh-pages/bpmn-fiddle/index.html
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bpmn-fiddle/index.html
          git diff --staged --quiet || git commit -m "deploy: bpmn-fiddle $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
